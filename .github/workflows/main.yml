name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update version in metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' BluePirMadness.json > tmp.json && mv tmp.json BluePirMadness.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bpMadness.json
          if ! git diff --cached --quiet; then
            git checkout -B main origin/main
            git add BluePirMadness.json
            git commit -m "chore: bump version to ${GITHUB_REF_NAME#v} [skip ci]"
            git push origin main
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"* %s by @%an" --invert-grep --grep="^chore: bump version")
          else
            LOG=$(git log --pretty=format:"* %s by @%an" --invert-grep --grep="^chore: bump version" $PREV_TAG..HEAD)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          prerelease: ${{ contains(github.ref_name, '-') }}